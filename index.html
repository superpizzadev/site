<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SUPER PIZZA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;

      display: flex;
      flex-direction: column;
      align-items: center;

      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: clamp(3rem, 7vw, 7rem);
      font-weight: 100;
      /* letter-spacing: .3rem; */

      text-shadow:
        0 0 20px rgba(255, 255, 255, .15),
        0 0 50px rgba(255, 180, 100, .2);
    }

    h5 {
      max-width: 900px;
      text-align: center;

      font-size: clamp(.9rem, 1.3vw, 1.2rem);
      line-height: 1.8;
      font-weight: 400;

      color: rgba(255, 255, 255, .7);
    }

    @font-face {

      font-family: 'PizzaFont';

      src: url('./1.ttf') format('truetype');

      font-weight: normal;

      font-style: normal;

    }

    h1 {

      font-family: 'PizzaFont', sans-serif;

    }
  </style>
</head>

<body>

  <div class="overlay">
    <h1>SUPER PIZZA</h1>

    <h5>
      Lorem ipsum dolor sit amet, consectetur adipiscing elit.
      Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
      Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.
    </h5>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">

    import * as THREE from 'three';

    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/GLTFLoader.js';

    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/controls/OrbitControls.js';

    import { EffectComposer } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/EffectComposer.js';

    import { RenderPass } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/RenderPass.js';

    import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();

    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      800
    );

    camera.position.set(0, 1, 1);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);

    renderer.setPixelRatio(window.devicePixelRatio);

    renderer.outputColorSpace = THREE.SRGBColorSpace;

    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    renderer.shadowMap.enabled = false;

    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);

    const renderPass = new RenderPass(scene, camera);

    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(
        window.innerWidth,
        window.innerHeight
      ),
      0.2,
      3,
      0.6
    );

    // composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);

    controls.enableDamping = false;
    controls.enableZoom = false;
    controls.enablePan = false;
    controls.enabled = false;

    const ambient = new THREE.AmbientLight(0xffd8b0, 1.5);

    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffc58f, 5);

    keyLight.position.set(5, 8, 5);

    keyLight.castShadow = false;

    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffe9cf, 2);

    fillLight.position.set(-5, 2, 4);

    scene.add(fillLight);

    const rimLight = new THREE.PointLight(0xffaa66, 30);

    rimLight.position.set(0, 4, -5);

    scene.add(rimLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.ShadowMaterial({
        opacity: 0.2
      })
    );

    floor.rotation.x = -Math.PI / 2;

    floor.position.y = -1.5;

    floor.receiveShadow = false;

    // scene.add(floor);

    let model;
    let skybox;

    const loader = new GLTFLoader();

    loader.load(
      './1.glb',
      (gltf) => {

        model = gltf.scene;

        model.traverse((child) => {

          if (child.isMesh) {

            child.castShadow = false;
            child.receiveShadow = false;

          }

        });

        const box = new THREE.Box3().setFromObject(model);

        const center = box.getCenter(new THREE.Vector3());

        model.position.sub(center);

        const prop = 0.8;
        model.scale.set(prop, prop, prop);

        scene.add(model);

      },
      undefined,
      (error) => {

        console.error(error);

      }
    );

    function loadSkybox() {

      const size = 150;

      const loader = new THREE.TextureLoader();

      const folder = '.';

      const rt = loader.load(folder + '/rt.png');
      const lf = loader.load(folder + '/lf.png');
      const up = loader.load(folder + '/up.png');
      const dn = loader.load(folder + '/dn.png');
      const ft = loader.load(folder + '/ft.png');
      const bk = loader.load(folder + '/bk.png');

      const textures = { rt, lf, up, dn, ft, bk };

      for (const t of Object.values(textures)) {

        t.colorSpace = THREE.SRGBColorSpace;

      }

      const materials = [
        new THREE.MeshBasicMaterial({
          map: rt,
          side: THREE.BackSide
        }),
        new THREE.MeshBasicMaterial({
          map: lf,
          side: THREE.BackSide
        }),
        new THREE.MeshBasicMaterial({
          map: up,
          side: THREE.BackSide
        }),
        new THREE.MeshBasicMaterial({
          map: dn,
          side: THREE.BackSide
        }),
        new THREE.MeshBasicMaterial({
          map: ft,
          side: THREE.BackSide
        }),
        new THREE.MeshBasicMaterial({
          map: bk,
          side: THREE.BackSide
        })
      ];

      const geo = new THREE.BoxGeometry(size, size, size);

      skybox = new THREE.Mesh(geo, materials);

      skybox.castShadow = false;
      skybox.receiveShadow = false;

      skybox.rotation.x = 3;

      scene.add(skybox);

    }

    loadSkybox();

    /* ─────────────── PARTICLES — floating spices ─────────────── */
    const particleCount = 320;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(particleCount * 3);
    const pSpeeds = new Float32Array(particleCount);
    const pOffsets = new Float32Array(particleCount);
    for (let i = 0; i < particleCount; i++) {
      pPos[i * 3] = (Math.random() - .5) * 7;
      pPos[i * 3 + 1] = (Math.random() - .5) * 4;
      pPos[i * 3 + 2] = (Math.random() - .5) * 7;
      pSpeeds[i] = .002 + Math.random() * .004;
      pOffsets[i] = Math.random() * Math.PI * 2;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({
      color: 0xffcc66,
      size: 0.018,
      transparent: true,
      opacity: 0.55,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);
    const clock = new THREE.Clock();


    function animate() {

      requestAnimationFrame(animate);

      if (model) {

        model.rotation.y += 0.0005;

      }

      if (skybox) {

        skybox.rotation.y -= 0.0001;

      }


      const t = clock.getElapsedTime();

      // Particles float
      const pPositions = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        pPositions[i * 3 + 1] += pSpeeds[i];
        pPositions[i * 3] += Math.sin(t * .5 + pOffsets[i]) * .001;
        if (pPositions[i * 3 + 1] > 2.5) pPositions[i * 3 + 1] = -2;
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.rotation.y += 0.0003;


      controls.update();

      composer.render();

    }

    animate();

    window.addEventListener('resize', () => {

      camera.aspect = window.innerWidth / window.innerHeight;

      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);

      composer.setSize(
        window.innerWidth,
        window.innerHeight
      );

    });

  </script>
